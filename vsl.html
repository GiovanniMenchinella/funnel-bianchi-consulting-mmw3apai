  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent: #2563EB;
      --accent-hover: #1D4ED8;
      --accent-muted: rgba(37, 99, 235, 0.12);
      --bg: #0A0A0A;
      --card: #111111;
      --elevated: #1A1A1A;
      --text-primary: #F8F8F8;
      --text-secondary: #A0A0A0;
      --text-muted: #606060;
      --border: rgba(255,255,255,0.08);
      --radius-card: 12px;
      --radius-btn: 8px;
      --radius-pill: 9999px;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .fade-in {
      animation: fadeInUp 0.7s ease forwards;
    }

    .fade-in-delay-1 { animation-delay: 0.1s; opacity: 0; animation-fill-mode: forwards; animation-name: fadeInUp; animation-duration: 0.7s; animation-timing-function: ease; }
    .fade-in-delay-2 { animation-delay: 0.2s; opacity: 0; animation-fill-mode: forwards; animation-name: fadeInUp; animation-duration: 0.7s; animation-timing-function: ease; }
    .fade-in-delay-3 { animation-delay: 0.35s; opacity: 0; animation-fill-mode: forwards; animation-name: fadeInUp; animation-duration: 0.7s; animation-timing-function: ease; }
    .fade-in-delay-4 { animation-delay: 0.5s; opacity: 0; animation-fill-mode: forwards; animation-name: fadeInUp; animation-duration: 0.7s; animation-timing-function: ease; }

    /* ─── LAYOUT ─── */
    .container {
      width: 100%;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .container--wide {
      max-width: 1100px;
    }

    section {
      padding: 80px 0;
    }

    /* ─── HEADER / LOGO ─── */
    .site-header {
      padding: 28px 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }

    .site-header .container {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .logo {
      height: 38px;
      width: auto;
      display: block;
    }

    .logo-fallback {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .logo-fallback span {
      color: var(--accent);
    }

    /* ─── HERO ─── */
    .hero {
      padding: 100px 0 60px;
      text-align: center;
    }

    .pill-label {
      display: inline-block;
      background: var(--accent-muted);
      color: var(--accent);
      border: 1px solid rgba(37,99,235,0.25);
      border-radius: var(--radius-pill);
      font-size: clamp(0.7rem, 1.5vw, 0.8rem);
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 6px 16px;
      margin-bottom: 28px;
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      font-weight: 900;
      line-height: 1.12;
      letter-spacing: -0.03em;
      color: var(--text-primary);
      margin-bottom: 20px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--accent);
    }

    .hero-sub {
      font-size: clamp(1rem, 2vw, 1.2rem);
      color: var(--text-secondary);
      max-width: 580px;
      margin: 0 auto 48px;
      line-height: 1.7;
      font-weight: 400;
    }

    /* ─── VIDEO ─── */
    .video-section {
      padding: 0 0 80px;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--card);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 14px;
    }

    .video-caption {
      text-align: center;
      margin-top: 16px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 400;
    }

    /* ─── PROBLEM / AGITATION ─── */

      font-size: 0.75rem;

      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--accent);

    }

    .section-title {
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);

      letter-spacing: -0.025em;

      margin-bottom: 20px;
    }

    .section-body {
      font-size: clamp(1rem, 1.8vw, 1.1rem);
      color: var(--text-secondary);
      line-height: 1.75;
    }

    .section-body p + p {
      margin-top: 16px;
    }

    .pain-list {
      list-style: none;
      margin: 32px 0;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .pain-list li {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 18px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      font-size: clamp(0.95rem, 1.6vw, 1.05rem);
      color: var(--text-secondary);
      line-height: 1.5;
      transition: border-color 0.2s ease;
    }

    .pain-list li:hover {
      border-color: rgba(255,255,255,0.14);
    }

    .pain-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      background: rgba(239, 68, 68, 0.12);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }

    .pain-icon svg {
      width: 10px;
      height: 10px;
    }

    /* ─── MECHANISM ─── */
    .mechanism-section {
      padding: 80px 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .mechanism-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 48px;
    }

    .mechanism-card {
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius-card);
      padding: 32px 28px;
      transition: border-color 0.2s ease, transform 0.2s ease;

    .mechanism-card:hover {

    .step-number {

    .mechanism-card h3 {

    .secret-weapon {

    .secret-weapon-text h4 {

    .secret-weapon-text p {
      font-size: 0.92rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    /* ─── SOCIAL PROOF ─── */
    .proof-section {
      padding: 80px 0;

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));

    .stat-card {

    .stat-card:hover {

    .stat-number {
      display: block;

    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-weight: 500;
      line-height: 1.4;
    }

    .case-study {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px;
      position: relative;
      overflow: hidden;

    .case-study::before {

    .case-study-header {

      align-items: center;

    .avatar-circle {

    .case-study-quote {
      font-size: clamp(1rem, 2vw, 1.15rem);

    .case-study-result {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(34,197,94,0.08);
      border: 1px solid rgba(34,197,94,0.2);
      border-radius: var(--radius-pill);
      padding: 8px 20px;
      font-size: 0.9rem;
      font-weight: 700;
      color: #4ade80;
    }

    /* ─── OFFER ─── */
    .offer-section {
      padding: 80px 0;
      background: var(--card);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }

    .deliverables-list {
      list-style: none;
      margin: 36px 0;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .deliverables-list li {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      font-size: clamp(0.95rem, 1.6vw, 1.05rem);
      color: var(--text-secondary);
      line-height: 1.55;
    }

    .check-icon {
      flex-shrink: 0;
      width: 22px;
      height: 22px;
      background: rgba(37,99,235,0.12);
      border: 1px solid rgba(37,99,235,0.25);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 1px;
    }

    .check-icon svg {
      width: 12px;

      color: var(--accent);
    }

    .price-block {
      background: var(--elevated);

      text-align: center;

    .price-label {

      color: var(--text-muted);

    .price-amount {
      font-size: clamp(2.5rem, 5vw, 3.8rem);

    }

    .price-period {
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    .price-note {
      margin-top: 14px;
      font-size: 0.88rem;
      color: var(--text-muted);
    }

    .guarantee-section {
      padding: 80px 0;
    }

    .guarantee-box {
      background: var(--elevated);
      border: 1px solid rgba(37,99,235,0.2);
      border-radius: 16px;
      padding: 48px 40px;

    }

      color: var(--text-secondary);

      line-height: 1.7;

      margin-bottom: 16px;
